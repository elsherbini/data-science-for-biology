name: Deploy site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2

      - uses: r-lib/actions/setup-renv@v2

      - uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: 1.9.37

      - name: Render active site
        run: quarto render

      - name: Composite the archive
        run: |
          mkdir -p _site/archive
          rsync -a archive/ _site/archive/
          # rsync (not `cp -r`) so it merges correctly: `quarto render` stages a
          # few archive link-targets into _site/archive/ when resolving the
          # relative links in past-workshops.qmd, so the dir already exists.

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
